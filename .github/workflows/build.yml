name: Build Delta APK

# This tells GitHub to run the build every time you push code
on:
  push:
    branches: [ "main" ] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Android 15 requires Java 17 to compile
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Sets up the Gradle build engine in the cloud
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.6'

    # The actual command that turns your Kotlin into an Android app
    - name: Compile the APK
      run: gradle assembleDebug

    # Uploads the finished .apk so you can download it to your phone
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Delta-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
