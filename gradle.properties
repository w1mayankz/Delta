# Gives the compiler permission to use Jetpack Compose
android.useAndroidX=true

# Silences the API 35 warning so your build logs stay clean
android.suppressUnsupportedCompileSdk=35

# Unlocks 3GB of RAM for the compiler so it doesn't run out of memory
org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8
